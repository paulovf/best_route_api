name: CD - Manual Production Deployment

on:
  workflow_dispatch:

jobs:
  deploy-to-render:
    name: Trigger Render Production Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Webhook
        run: |
          echo "Starting deployment to Render production environment..."
          
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "ERRO: The RENDER_DEPLOY_HOOK_URL secret is empty or not found in GitHub secrete env vars"
            exit 1
          fi
          
          curl -sS -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" --max-time 15
          
          echo ""
          echo "Deployment signal sent successfully!"
