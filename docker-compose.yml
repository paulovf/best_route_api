services:
  postgres-local:
    image: postgres:17.6-alpine
    container_name: database
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bestroute-api-network

  postgres-test:
    image: postgres:17.6-alpine
    container_name: database_test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: postgres_test
      POSTGRES_USER: postgres_test
      POSTGRES_PASSWORD: postgres_test
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - bestroute-api-network

  api:
    build: .
    container_name: bestroute-api-container
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-local:5432/postgres
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - postgres-local
    networks:
      - bestroute-api-network

  tests:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: bestroute-api-test
    volumes:
      - .:/app
      - ./.m2:/root/.m2
    working_dir: /app
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - DB_HOST=postgres-test
      - DB_PORT=5432
      - DB_USERNAME=postgres_test
      - DB_PASSWORD=postgres_test
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - postgres-test
    networks:
      - bestroute-api-network
    command: mvn test

volumes:
  postgres_data:
  postgres_test_data:

networks:
  bestroute-api-network: